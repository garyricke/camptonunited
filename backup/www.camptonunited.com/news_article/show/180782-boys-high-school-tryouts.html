      }, false);
    });
  };

</script>

<script type="text/javascript">
  function phoneMask() {
    var el = document.getElementById('user_login');
    var maskedPhone = el.value.match(/(\d{3})(\d{3})(\d{4})/);
    if (maskedPhone) {
      el.value = "(" + maskedPhone[1] + ") " + maskedPhone[2] + "-" + maskedPhone[3];
    }
  }

  (function($){
    $("form").submit(function() {
      var el = document.getElementById('user_login');
      var isPhone = el.value.match(/^(?:\+?\d{1,3}\s*-?)?\(?(?:\d{3})?\)?[- ]?\d{3}[- ]?\d{4}$/);
      var loginType = isPhone ? 'Phone' : 'Email';
      action  = "NextToPasswordClick.Entered" + loginType;
      window.seAnalytics = window.seAnalytics || {};
      window.seAnalytics.seEvent({
        depth1: "SingleSignOn",
        depth2: "Step1",
        action: action,
        event_type: 1
      });

    });
  })(jQuery);

</script>
